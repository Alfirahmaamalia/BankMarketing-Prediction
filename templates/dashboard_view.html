{% extends "base.html" %}
{% block title %}Insight Bisnis - Dashboard Looker{% endblock %}
{% block content %}

<div class="dash-wrapper-card">

    <!-- Premium Dashboard Header -->
    <div class="dash-header">
        <div class="dash-header-content">
            <div class="icon-bulb">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="texts">
                <h1>Pusat Kontrol Visualisasi Data</h1>
            </div>
        </div>
    </div>

    <!-- The Actual Iframe -->
    <div class="dashboard-container">
        <!-- Tautan langsung sebagai cadangan karena link /s/ diblokir oleh Google untuk iframe -->
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="https://datastudio.google.com/reporting/982c6a2f-0f9a-44a4-8be4-3cda279306c2" target="_blank"
                style="background-color: #0f172a; color: #d4a843; border: 2px solid #d4a843; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; display: inline-block;">
                <i class="fas fa-external-link-alt"></i> Buka Dashboard Looker Studio di Tab Baru
            </a>
        </div>

        <div class="iframe-wrapper">
            <iframe width="100%" height="900"
                src="https://lookerstudio.google.com/embed/reporting/982c6a2f-0f9a-44a4-8be4-3cda279306c2"
                frameborder="0" style="border:0" allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-top-navigation allow-popups">
            </iframe>
        </div>
    </div>

</div>

<style>
    body {
        background-color: #faf8f3;
        margin: 0;
        font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    main,
    .main-content {
        max-width: 1600px;
        margin: 0 auto;
        padding: 20px 1.5rem;
    }

    .dash-wrapper-card {
        background-color: white;
        margin: 10px auto;
        border-radius: 20px;
        border: 1px solid #e2d9c8;
        box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08);
        padding: 30px;
    }

    .dash-header {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 25px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
    }

    .dash-header-content {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-bulb {
        background: #d4a843;
        color: #0f172a;
        width: 60px;
        height: 60px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 4px 10px rgba(212, 168, 67, 0.3);
    }

    .texts h1 {
        color: #ffffff;
        margin: 0 0 5px 0;
        font-size: 26px;
        font-weight: 800;
        border: none;
        padding: 0;
    }

    .texts p {
        color: rgba(255, 255, 255, 0.7);
        margin: 0;
        font-size: 15px;
        max-width: 800px;
    }

    .dashboard-container {
        padding: 0 !important;
        max-width: 100% !important;
        margin: 0 !important;
    }

    .iframe-wrapper {
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        padding: 0;
        overflow: hidden;
        border: 1px solid #e2d9c8;
    }

    @media (max-width: 768px) {
        .dash-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
        }
    }
</style>
{% endblock %}
