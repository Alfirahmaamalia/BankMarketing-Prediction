<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bank Marketing Analytics{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar dark-navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo text-white">
                Data Science Bank Marketing Analyze
            </a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link text-white {% if request.path == '/' %}active{% endif %}"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/dashboard" class="nav-link text-white {% if request.path == '/dashboard' %}active{% endif %}"><i class="fas fa-chart-pie"></i> Dashboard Analisis</a></li>
                <li><a href="/predict" class="nav-btn-predict"><i class="fas fa-brain"></i> Predict Subscription</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
